<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<style>
    body {
        background-color: #000000;
        color: #ffffff;
        padding: 10px 40px;         
    }
    .header-bar {
        display: flex;
        align-items: baseline; 
        gap: 30px;             
        margin-bottom: 40px;   
    }
    .market-container {
        background-color: #b0b5bc; 
        padding: 20px;            
        border-radius: 12px;     
        min-height: 600px;         
        
        display: flex;
        flex-direction: column;    
        gap: 40px;                 
    }
    .columns-wrapper {
        display: flex;      
        gap: 30px;          
    }
    .left-box {
        background-color: #1a1b1e; 
        flex: 1;                  
        padding: 15px 30px 30px 30px;
        border-radius: 8px;
        min-height: 300px;         
    }
   
    .right-box {
        background-color: #1a1b1e; 
        flex: 1;                   
        padding: 15px 30px 30px 30px;
        border-radius: 8px;
        min-height: 300px;         
    }
    .market-chart-img {
        width: 100%;         
        height: 300px;       
        
       
        object-fit: cover;   
        
        border-radius: 4px;
        margin-top: 15px;    
        display: block;
    }
    
    .search-wrapper {
        display: flex;
        justify-content: center;   
        width: 100%;
        margin-top: 10px;          
    }

    /* 실제 검색창 상자 디자인 */
    .search-bar {
        background-color: #1a1b1e; 
        color: #ffffff;            
        border: none;             
        
        width: 50%;                
        height: 50px;
        padding: 14px 20px;        
        
        font-size: 30px;
        font-weight: bold;
        text-align: center;        
        border-radius: 6px;        
        outline: none;            
    }

   
    .search-bar::placeholder {
        color: #9095a0;            
    }
    
    .main-list-box {
        background-color: #1a1b1e; 
        padding: 35px 40px;        
        border-radius: 8px;
        min-height: 300px;         
        box-sizing: border-box;
    }

    /* 박스 내부 제목 스타일 */
    .main-list-box h2 {
        font-size: 26px;
        font-weight: bold;
        margin-top: 0;
        margin-bottom: 30px;
        text-align: left;          
    }

   
    .market-coin-row {
        display: flex;
        justify-content: space-between; 
        align-items: center;            
        padding: 20px 10px;            
        border-bottom: 1px solid #2c2d31; 
    }

    
    .market-coin-row:last-child {
        border-bottom: none;
    }

    
    .coin-name, .coin-price {
        font-size: 20px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 10px;           
    }
    .coin-price {
        color: #ff3b30; 
    }
    .coin-icon {
        width: 24px;         
        height: 24px;        
        object-fit: contain; 
        border-radius: 50%;  
    }
</style>
<body>

    <div class="header-bar">
        <h1>마켓</h1>
    </div>

    <div class="market-container">
        
        <div class="columns-wrapper">
            
            <div class="left-box">
                <h3>비트코인</h3>
                <img src="img/bitchart.png" alt="비트코인 차트" class="market-chart-img">
            </div>

            <div class="right-box">
                <h3>이더리움</h3>
                <img src="img/ethchart.png" alt="비트코인 차트" class="market-chart-img">
            </div>

        </div> 
    
        <div class="search-wrapper">
            <input type="text" class="search-bar" placeholder="코인 검색창">
        </div>

        <div class="main-list-box">
            <h2>상위 코인들 (가격, 거래대금)</h2>
            
            <div class="market-coin-row">
                <span class="coin-name"><img src="img/bitcoin.png"  class="coin-icon"> 비트코인 (BTC)</span>
                <span class="coin-price">95,450,000 원</span>
            </div>
            
            <div class="market-coin-row">
                <span class="coin-name"><img src="img/ether.jpg"  class="coin-icon"> 이더리움 (ETH)</span>
                <span class="coin-price">4,820,000 원</span>
            </div>
            
            <div class="market-coin-row">
                <span class="coin-name"><img src="img/Solana.png" class="coin-icon"> 솔라나 (SOL)</span>
                <span class="coin-price">210,000 원</span>
            </div>

            <div class="market-coin-row">
                <span class="coin-name"><img src="img/XRP.jpg" class="coin-icon"> 리플 (XRP)</span>
                <span class="coin-price">850 원</span>
            </div>
        </div>
    </div>
</body>
</html>
