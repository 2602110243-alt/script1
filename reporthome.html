<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<style>
    body {
        background-color: #000000;
        color: #ffffff;
        padding: 10px 40px; /* ⚠️ 오타를 완전히 지워두었습니다! */          
    }
    .header-bar {
        display: flex;
        align-items: baseline; 
        gap: 30px;             
        margin-bottom: 40px;   
    }
    .nav-menu {
        display: flex;
        gap: 50px; 
    }
    .nav-item {
        font-size: 20px;     
        color: #9095a0;      
        font-weight: bold;
        cursor: pointer;     
        text-decoration: none; /* 👈 링크의 못생긴 밑줄을 지워주는 마법의 코드! */
    }
    .nav-item:hover {
        color: #ffffff;
    }
    .coin-logo {
        width: 40px;         
        height: 40px;        
        object-fit: contain; 
    }

    /* 💡 [핵심 추가] 왼쪽 코인과 오른쪽 지수를 가로로 나란히 찢어주는 거대한 바구니 */
    .main-wrapper {
        display: flex;
        gap: 40px;      /* 왼쪽 구역과 오른쪽 구역 사이의 간격 */
        align-items: flex-start; /* 두 구역의 윗 라인을 똑같이 맞춤 */
    }

    /* 💡 [핵심 추가] 왼쪽 코인 구역 (전체 너비의 70%만큼 차지하라는 뜻) */
    .left-content {
        flex: 7; 
    }

    /* 💡 [핵심 추가] 오른쪽 공포탐욕지수 구역 (전체 너비의 30%만큼 차지하라는 뜻) */
    .right-content {
        flex: 3; 
    }

    /* 코인들을 세로로 쌓는 바구니 */
    .coin-list {
        display: flex;
        flex-direction: column; 
        gap: 40px;              
    }   

    /* 개별 코인 박스 */
    .coin-item {
        background-color: #141517; 
        padding: 20px 20px;        
        border-radius: 8px;        
        font-size: 30px;       
        font-weight: bold;     
        
        display: flex;         
        align-items: center;   
        gap: 20px;             
    }

    /* 💡 [핵심 추가] 오른쪽 공포탐욕지수 전용 박스 디자인 */
    .fear-greed-box {
        background-color: #141517; /* 코인 박스랑 똑같은 세련된 회색 */
        padding: 30px;
        border-radius: 8px;
        min-height: 300px;         /* 박스가 너무 찌그러지지 않게 최소 높이 지정 */
    }

    .fear-greed-box h3 {
        font-size: 22px;
        margin-top: 0;
        margin-bottom: 20px;
        color: #eceef2;
    }

    /* 💡 [핵심 추가] 공포탐욕지수 안에 들어갈 이미지 크기 조절 */
    .gauge-img {
        width: 100%;       /* 우측 박스 너비에 딱 맞게 자동으로 조절됨 */
        height: auto;
        border-radius: 6px;
    }
    /* [새로 추가] 인기커뮤니티글 전체 상자 디자인 */
    .community-box {
        background-color: #141517; /* 똑같은 세련된 회색 배경 */
        padding: 25px;
        border-radius: 8px;
        display: flex;
        flex-direction: column;    /* 글들을 위에서 아래로 쌓기 */
        gap: 15px;                 /* 글과 글 사이의 간격 */
    }

    /* [새로 추가] 게시글 한 줄 한 줄의 스타일 */
    .post-item {
        font-size: 18px;           /* 글씨 크기 설정 */
        color: #eceef2;            /* 살짝 밝은 회색 글자색 */
        cursor: pointer;           /* 마우스 올리면 손가락 모양 변하게 */
        
        border-bottom: 1px solid #22252a; /* 글 사이에 은은한 구분선 넣기 */
    }

    /* 마우스 올렸을 때 글씨가 하얗게 강조되는 효과 */
    .post-item:hover {
        color: #ffffff;
    }
</style>
</head>
<body>
    
    <div class="header-bar">
        <h1>홈화면</h1>
        <div class="nav-menu">
            <a href="reportmarket.html" class="nav-item">마켓</a>
            <a href="reportcommunity.html" class="nav-item">커뮤니티</a>
            <a href="reportMYpage.html" class="nav-item">MY페이지</a>
        </div>
    </div>

    <div class="main-wrapper">

        <div class="left-content">
            <h2>실시간 인기 코인</h2>
            <div class="coin-list">
                <div class="coin-item"><img src="img/USDT.webp" class="coin-logo"><span>USDT</span></div>
                <div class="coin-item"><img src="img/bitcoin.png" class="coin-logo">비트코인</div>
                <div class="coin-item"><img src="img/ether.jpg" class="coin-logo">이더리움</div>
                <div class="coin-item"><img src="img/Solana.png" class="coin-logo">솔라나</div>
                <div class="coin-item"><img src="img/XRP.jpg" class="coin-logo">리플</div>
            </div>
        </div>

        <div class="right-content">
            <h2>공포탐욕지수</h2>
            <div class="fear-greed-box">
                <img src="img/feargreed.png" alt="공포탐욕지수 그래프" class="gauge-img">
            </div>
            <h2>인기 커뮤니티 글</h2>
            <div class="community-box">
                <div class="post-item"> 도지코인 지금 타도 될까요?</div>
                <div class="post-item"> 이번 주 비트코인 전망 분석해 드립니다.</div>
                <div class="post-item"> 리플 소송 관련 최신 뉴스가 떴네요.</div>
            </div>
        </div>

    </div> </body>
</html>
