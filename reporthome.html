<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<style>
    body {
        background-color: #000000;
        color: #ffffff;
        padding: 10px 40px;        
    }
    .header-bar {
        display: flex;
        align-items: baseline; 
        gap: 30px;             
        margin-bottom: 40px;   
    }
    .nav-menu {
        display: flex;
        gap: 50px; 
    }
    .nav-item {
        font-size: 20px;     
        color: #9095a0;      
        font-weight: bold;
        cursor: pointer;     
        text-decoration: none; 
    }
    .nav-item:hover {
        color: #ffffff;
    }
    .coin-logo {
        width: 40px;         
        height: 40px;        
        object-fit: contain; 
    }

   
    .main-wrapper {
        display: flex;
        gap: 40px;      
        align-items: flex-start; 
    }

    
    .left-content {
        flex: 7; 
    }

   
    .right-content {
        flex: 3; 
    }

    
    .coin-list {
        display: flex;
        flex-direction: column; 
        gap: 40px;              
    }   

    
    .coin-item {
        background-color: #141517; 
        padding: 20px 20px;        
        border-radius: 8px;        
        font-size: 30px;       
        font-weight: bold;     
        
        display: flex;         
        align-items: center;   
        gap: 20px;             
    }

    
    .fear-greed-box {
        background-color: #141517; 
        padding: 30px;
        border-radius: 8px;
        min-height: 300px;         
    }

    .fear-greed-box h3 {
        font-size: 22px;
        margin-top: 0;
        margin-bottom: 20px;
        color: #eceef2;
    }

    
    .gauge-img {
        width: 100%;      
        height: auto;
        border-radius: 6px;
    }
   
    .community-box {
        background-color: #141517; 
        padding: 25px;
        border-radius: 8px;
        display: flex;
        flex-direction: column;    
        gap: 15px;                 
    }

    
    .post-item {
        font-size: 18px;           
        color: #eceef2;           
        cursor: pointer;           
        
        border-bottom: 1px solid #22252a; 
    }

    
    .post-item:hover {
        color: #ffffff;
    }
</style>
</head>
<body>
    
    <div class="header-bar">
        <h1>홈화면</h1>
        <div class="nav-menu">
            <a href="reportmarket.html" class="nav-item">마켓</a>
            <a href="reportcommunity.html" class="nav-item">커뮤니티</a>
            <a href="reportMYpage.html" class="nav-item">MY페이지</a>
        </div>
    </div>

    <div class="main-wrapper">

        <div class="left-content">
            <h2>실시간 인기 코인</h2>
            <div class="coin-list">
                <div class="coin-item"><img src="img/USDT.webp" class="coin-logo"><span>USDT</span></div>
                <div class="coin-item"><img src="img/bitcoin.png" class="coin-logo">비트코인</div>
                <div class="coin-item"><img src="img/ether.jpg" class="coin-logo">이더리움</div>
                <div class="coin-item"><img src="img/Solana.png" class="coin-logo">솔라나</div>
                <div class="coin-item"><img src="img/XRP.jpg" class="coin-logo">리플</div>
            </div>
        </div>

        <div class="right-content">
            <h2>공포탐욕지수</h2>
            <div class="fear-greed-box">
                <img src="img/feargreed.png" alt="공포탐욕지수 그래프" class="gauge-img">
            </div>
            <h2>인기 커뮤니티 글</h2>
            <div class="community-box">
                <div class="post-item"> 도지코인 지금 타도 될까요?</div>
                <div class="post-item"> 이번 주 비트코인 전망 분석해 드립니다.</div>
                <div class="post-item"> 리플 소송 관련 최신 뉴스가 떴네요.</div>
            </div>
        </div>

    </div> </body>
</html>
